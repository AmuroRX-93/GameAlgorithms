<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GameAlgorithms — playable demos</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0c0e14;
      --panel: #141826;
      --border: #2a3148;
      --text: #d8dceb;
      --muted: #7d859f;
      --accent: #f5d76e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }
    main {
      max-width: 720px;
      width: 100%;
    }
    h1 {
      font-family: Menlo, Consolas, monospace;
      letter-spacing: 0.04em;
      color: var(--accent);
      margin: 0 0 8px;
    }
    p.lead {
      margin: 0 0 32px;
      color: var(--muted);
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    @media (min-width: 560px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    .card {
      display: block;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      color: inherit;
      text-decoration: none;
      transition: transform 80ms ease, border-color 80ms ease;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .card h2 {
      margin: 0 0 4px;
      font-family: Menlo, Consolas, monospace;
      font-size: 18px;
    }
    .card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(245, 215, 110, 0.12);
      color: var(--accent);
      margin-left: 6px;
      vertical-align: middle;
    }
    footer {
      margin-top: 32px;
      color: var(--muted);
      font-size: 13px;
    }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <h1>GameAlgorithms</h1>
    <p class="lead">A collection of game-development algorithm demos in Python &amp; pygame, compiled to WebAssembly.</p>

    <div class="grid">
      <a class="card" href="./SoloPong/">
        <h2>Solo Pong <span class="badge">playable</span></h2>
        <p>Single-player Pong with bricks, multi-ball, an AI opponent that never misses, and two AI demo modes.</p>
      </a>
    </div>

    <footer>
      Source: <a href="https://github.com/AmuroRX-93/GameAlgorithms">github.com/AmuroRX-93/GameAlgorithms</a>
    </footer>
  </main>
</body>
</html>
