name: Deploy GameAlgorithms to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'SoloPongWeb/**'
      - 'site/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site
        # Layout we deploy:
        #   /                -> landing page (links to each playable demo)
        #   /SoloPong/       -> the Solo Pong game (single static page)
        #
        # No build step: SoloPongWeb is plain HTML + JS, so we just copy.
        run: |
          mkdir -p _site/SoloPong
          cp -R SoloPongWeb/. _site/SoloPong/
          cp site/index.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
